name: build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-release
            os: windows-2022
            generator: Visual Studio 17 2022
            artifact_name: WapDemSaturation-windows
            package_platform: windows
          - name: macos-release
            os: macos-13
            generator: Xcode
            artifact_name: WapDemSaturation-macos
            package_platform: macos

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build -G "${{ matrix.generator }}" \
            -A x64 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cmake -S . -B build -G "${{ matrix.generator }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: bash
        run: bash ./scripts/package_artifacts.sh build "${{ matrix.package_platform }}" Release

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/dist/WapDemSaturation-${{ matrix.package_platform }}.zip
            build/dist/WapDemSaturation-${{ matrix.package_platform }}/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
